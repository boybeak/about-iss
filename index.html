<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 · InputSourceSimple</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 全局重置与字体 —— GitHub README 风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            line-height: 1.6;
            background-color: #ffffff;
            color: #1f2328;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            transition: background-color 0.2s, color 0.2s;
        }

        /* 内容容器——仿 GitHub 阅读宽度，无阴影无圆角（只有天然白底） */
        .markdown-body {
            max-width: 900px;
            width: 100%;
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 2rem 2.5rem;
            box-shadow: none;
        }

        /* 标题样式 —— 参照 GitHub Markdown */
        h1, h2, h3, h4 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            line-height: 1.25;
        }

        h1 {
            padding-bottom: 0.3rem;
            font-size: 2em;
            border-bottom: 1px solid #d0d7de;
        }

        h2 {
            padding-bottom: 0.3rem;
            font-size: 1.5em;
            border-bottom: 1px solid #d0d7de;
        }

        h3 {
            font-size: 1.25em;
            margin-top: 1.2rem;
            margin-bottom: 0.5rem;
        }

        p, ul, ol, blockquote {
            margin-top: 0;
            margin-bottom: 1rem;
        }

        /* 列表样式 */
        ul, ol {
            padding-left: 2em;
        }

        li {
            margin: 0.25rem 0;
        }

        /* 链接 */
        a {
            color: #0969da;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 引用块/信息框 */
        blockquote {
            padding: 0 1em;
            color: #57606a;
            border-left: 0.25em solid #d0d7de;
            margin: 1rem 0;
        }

        /* 代码块 */
        code {
            padding: 0.2em 0.4em;
            background-color: #f6f8fa;
            border-radius: 3px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 85%;
        }

        pre {
            padding: 1rem;
            overflow: auto;
            background-color: #f6f8fa;
            border-radius: 3px;
            line-height: 1.45;
            margin-bottom: 1rem;
        }

        pre code {
            background: none;
            padding: 0;
        }

        /* 表格 (用于开源库列表) */
        table {
            display: block;
            width: 100%;
            width: max-content;
            max-width: 100%;
            overflow: auto;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        th, td {
            padding: 0.5rem 1rem;
            border: 1px solid #d0d7de;
            text-align: left;
        }

        th {
            background-color: #f6f8fa;
            font-weight: 600;
        }

        tr {
            background-color: #ffffff;
        }

        /* 分割线 */
        hr {
            height: 0.25em;
            padding: 0;
            margin: 1.5rem 0;
            background-color: #d0d7de;
            border: 0;
        }

        /* 头像占位 */
        .avatar {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #d0d7de;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        /* 联系方式列表 */
        .contact-list {
            list-style: none;
            padding-left: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem 2rem;
        }

        .contact-list li {
            margin: 0;
        }

        .contact-list a {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: #1f2328;
        }

        .contact-list a:hover {
            color: #0969da;
        }

        /* 深色模式 (GitHub 深色风格) */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0d1117;
                color: #e6edf3;
            }

            .markdown-body {
                background-color: #0d1117;
                border-color: #3d444d;
            }

            h1, h2 {
                border-bottom-color: #3d444d;
            }

            a {
                color: #4493f8;
            }

            blockquote {
                color: #7d8590;
                border-left-color: #3d444d;
            }

            code {
                background-color: #2a313c;
                color: #e6edf3;
            }

            pre {
                background-color: #151b23;
            }

            th, td {
                border-color: #3d444d;
            }

            th {
                background-color: #212830;
            }

            tr {
                background-color: #0d1117;
            }

            hr {
                background-color: #3d444d;
            }

            .avatar {
                background-color: #3d444d;
            }

            .contact-list a {
                color: #e6edf3;
            }

            .contact-list a:hover {
                color: #4493f8;
            }

            table, blockquote, pre, code {
                border-color: #3d444d;
            }
        }

        /* 小屏适配 */
        @media (max-width: 600px) {
            .markdown-body {
                padding: 1.5rem;
            }

            .contact-list {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        /* 更新日志中的版本标记样式 */
        .version-tag {
            display: inline-block;
            background: #f6f8fa;
            border-radius: 2em;
            padding: 0.2rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 500;
            margin-left: 0.5rem;
            color: #1f2328;
            border: 1px solid #d0d7de;
        }

        @media (prefers-color-scheme: dark) {
            .version-tag {
                background: #2a313c;
                border-color: #3d444d;
                color: #e6edf3;
            }
        }
    </style>
</head>
<body>
    <article class="markdown-body">
        <!-- 应用基本信息 -->
        <div id="app-info"></div>

        <hr />

        <!-- 更新日志部分 -->
        <h2>📋 更新日志</h2>

        <h3>1.0.0 <span class="version-tag">最新</span></h3>
        <p><em>2026年1月15日</em></p>
        <ul>
            <li>首次发布</li>
            <li>悬停显示当前输入法状态</li>
            <li>Caps Lock 监控</li>
            <li>两种显示风格：Simple 和 Normal</li>
            <li>开机自启动支持</li>
            <li>Dock 图标隐藏</li>
            <li>多显示器支持</li>
        </ul>

        <blockquote>
            <p>完整更新历史请参阅 <a href="#">GitHub Releases</a> 页面。</p>
        </blockquote>

        <!-- 主要功能说明 -->
        <div id="features"></div>

        <!-- 使用说明 -->
        <div id="quickstart"></div>

        <!-- 开源库声明 -->
        <div id="open-source"></div>

        <!-- 开发者个人信息与联系方式 -->
        <div id="developer"></div>

        <hr />

        <!-- 脚注 -->
        <p style="color: #57606a; font-size: 0.85rem;">
            © 2026 Beak · 基于 MIT 许可证开源。<br />
            InputSourceSimple 与 Apple Inc. 无关。Apple、macOS 是 Apple Inc. 的注册商标。
        </p>
    </article>

    <script>
        // 加载并渲染 markdown 文件
        async function loadMarkdownFile(filePath, elementId) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) {
                    throw new Error(`Failed to load ${filePath}: ${response.status}`);
                }
                const markdown = await response.text();
                const html = marked.parse(markdown);
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error('Error loading markdown file:', error);
                document.getElementById(elementId).innerHTML = `<p style="color: red;">加载失败: ${error.message}</p>`;
            }
        }

        // 页面加载完成后加载所有 markdown 文件
        document.addEventListener('DOMContentLoaded', function() {
            loadMarkdownFile('app-info.md', 'app-info');
            loadMarkdownFile('features.md', 'features');
            loadMarkdownFile('quickstart.md', 'quickstart');
            loadMarkdownFile('open-source.md', 'open-source');
            loadMarkdownFile('developer.md', 'developer');
        });
    </script>
</body>
</html>
